services:
  backend:
    build: ./
    image: slink_image:v1
    scale: 3 # 3 replicas of the backend
    env_file:
      - .env
    volumes:
      - db_data:/app/data
    read_only: true
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  proxy:
    image: nginx:1.31.2-alpine
    container_name: slink_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run

volumes:
  db_data:
