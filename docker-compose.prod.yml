x-backend-healthcheck: &backend-healthcheck
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
      ]
    interval: 30s
    timeout: 3s
    retries: 3
    start_period: 10s

x-backend-config: &backend-config
  build: ./
  image: slink_image:v1
  env_file:
    - .env
  volumes:
    - db_data:/app/data
  read_only: true
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  backend-1:
    <<: [*backend-config, *backend-healthcheck]
    environment:
      - BACKEND_ID=1
  backend-2:
    <<: [*backend-config, *backend-healthcheck]
    environment:
      - BACKEND_ID=2
  backend-3:
    <<: [*backend-config, *backend-healthcheck]
    environment:
      - BACKEND_ID=3
  proxy:
    image: nginx:1.31.2-alpine
    container_name: slink_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy
      backend-3:
        condition: service_healthy

volumes:
  db_data:
